spring.application.name=ecommerce-backend

# Server Configuration

server.port=${PORT:8080}

# Database Configuration (MySQL)
spring.datasource.url=jdbc:mysql://${DB_HOST}:${DB_PORT}/${DB_NAME}?ssl-mode=REQUIRED

spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA / Hibernate Properties
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Swagger/OpenAPI Configuration
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# JWT Security Configurations
# 256-bit secret key for HS256 algorithm
jwt.secret=9a4f2c8d3b7a1e5f8g2h6j1k3m5n7p9q0r2s4t6u8v0w2x4y6z8A0B2C4D6E8F0G2
jwt.expiration=86400000
